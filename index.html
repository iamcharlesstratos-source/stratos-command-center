<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0B1020" />
  <title>Marketing Command Center</title>
  <link rel="stylesheet" href="css/styles.css?v=5" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='11' fill='%23FFFFFF'/%3E%3Cg stroke='%2315235E' stroke-width='1.92' stroke-linecap='round' fill='none'%3E%3Cline x1='24' y1='24' x2='24' y2='11.2'/%3E%3Cline x1='24' y1='24' x2='35.09' y2='17.6'/%3E%3Cline x1='24' y1='24' x2='35.09' y2='30.4'/%3E%3Cline x1='24' y1='24' x2='24' y2='36.8'/%3E%3Cline x1='24' y1='24' x2='12.91' y2='30.4'/%3E%3Cline x1='24' y1='24' x2='12.91' y2='17.6'/%3E%3C/g%3E%3Cg fill='%231E6FF5' stroke='%2315235E' stroke-width='1.76'%3E%3Ccircle cx='24' cy='11.2' r='3.68'/%3E%3Ccircle cx='35.09' cy='17.6' r='3.68'/%3E%3Ccircle cx='35.09' cy='30.4' r='3.68'/%3E%3Ccircle cx='24' cy='36.8' r='3.68'/%3E%3Ccircle cx='12.91' cy='30.4' r='3.68'/%3E%3Ccircle cx='12.91' cy='17.6' r='3.68'/%3E%3C/g%3E%3Ccircle cx='24' cy='24' r='5.28' fill='%23FFFFFF' stroke='%2315235E' stroke-width='1.92'/%3E%3Ccircle cx='24' cy='24' r='2.72' fill='%231E6FF5'/%3E%3C/svg%3E" />
</head>
<body>
  <div id="app">
    <!-- ============== Sidebar ============== -->
    <aside class="sidebar">
      <div class="brand">
        <svg class="brand__logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- spokes -->
          <g class="bm-stroke" stroke-width="2.6" stroke-linecap="round">
            <line x1="24" y1="24" x2="24" y2="8"/>
            <line x1="24" y1="24" x2="37.86" y2="16"/>
            <line x1="24" y1="24" x2="37.86" y2="32"/>
            <line x1="24" y1="24" x2="24" y2="40"/>
            <line x1="24" y1="24" x2="10.14" y2="32"/>
            <line x1="24" y1="24" x2="10.14" y2="16"/>
          </g>
          <!-- outer nodes -->
          <g class="bm-fill bm-stroke" stroke-width="2.4">
            <circle cx="24" cy="8" r="4.7"/>
            <circle cx="37.86" cy="16" r="4.7"/>
            <circle cx="37.86" cy="32" r="4.7"/>
            <circle cx="24" cy="40" r="4.7"/>
            <circle cx="10.14" cy="32" r="4.7"/>
            <circle cx="10.14" cy="16" r="4.7"/>
          </g>
          <!-- hub -->
          <circle cx="24" cy="24" r="6.8" class="bm-center" stroke-width="2.6"/>
          <circle cx="24" cy="24" r="3.5" class="bm-fill"/>
        </svg>
        <div>
          <div class="brand__name">Marketing <span class="brand__accent">Command</span></div>
          <div class="brand__sub">Center</div>
        </div>
      </div>

      <nav class="nav" id="nav">
        <a class="nav__item" data-route="dashboard" href="#/dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
          <span>Dashboard</span><span class="nav__num" data-count="dashboard"></span>
        </a>
        <a class="nav__item" data-route="products" href="#/products">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
          <span>Product Testing</span><span class="nav__num" data-count="products"></span>
        </a>
        <a class="nav__item" data-route="creatives" href="#/creatives">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/></svg>
          <span>Creative Testing</span><span class="nav__num" data-count="creatives"></span>
        </a>
        <a class="nav__item" data-route="daily" href="#/daily">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
          <span>Daily Metrics</span><span class="nav__num" data-count="daily"></span>
        </a>
        <a class="nav__item" data-route="pages" href="#/pages">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8M15 18h-5M10 6h8v4h-8V6Z"/></svg>
          <span>Page Status</span><span class="nav__num" data-count="pages"></span>
        </a>
        <a class="nav__item" data-route="content" href="#/content">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/><path d="m9 9 1.5 1.5M15 7l.7.7"/></svg>
          <span>AI Content</span><span class="nav__num" data-count="content"></span>
        </a>
        <a class="nav__item" data-route="competitors" href="#/competitors">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <span>Competitor Ads</span><span class="nav__num" data-count="competitors"></span>
        </a>
        <a class="nav__item" data-route="experiments" href="#/experiments">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2v7.31"/><path d="M14 9.3V2"/><path d="M8.5 2h7"/><path d="M14 9.3a6.5 6.5 0 1 1-4 0"/><path d="M5.58 16.5h12.85"/></svg>
          <span>A/B Tests</span><span class="nav__num" data-count="experiments"></span>
        </a>

        <div class="nav__section-label">Tools</div>
        <a class="nav__item nav__tool" href="https://www.facebook.com/ads/library/?active_status=active&ad_type=all&country=PH&media_type=all" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 2 9 5-9 5-9-5 9-5Z"/><path d="m3 12 9 5 9-5"/><path d="m3 17 9 5 9-5"/></svg>
          <span>FB Ad Library</span><span class="nav__ext" aria-hidden="true">↗</span>
        </a>
        <a class="nav__item nav__tool" href="https://www.facebook.com/adsmanager/" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="10" width="3" height="7"/><rect x="12" y="6" width="3" height="11"/><rect x="17" y="13" width="3" height="4"/></svg>
          <span>Meta Ads Manager</span><span class="nav__ext" aria-hidden="true">↗</span>
        </a>
        <a class="nav__item nav__tool" href="https://ads.tiktok.com/business/creativecenter/" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/></svg>
          <span>TikTok Creative Center</span><span class="nav__ext" aria-hidden="true">↗</span>
        </a>

        <div class="nav__team" id="navTeam"></div>
        <div class="nav__spacer"></div>
        <div class="nav__foot">Internal ops tool · localStorage</div>
      </nav>
    </aside>

    <!-- ============== Main column ============== -->
    <div class="main">
      <header class="topbar">
        <div class="topbar__chips" id="summaryChips"></div>
        <div class="topbar__spacer"></div>
        <div class="topbar__actions">
          <button class="btn btn--ghost btn--sm" id="btnImport" title="Restore data from a .json backup">
            <span class="btn__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg></span>
            <span>Import</span>
          </button>
          <button class="btn btn--ghost btn--sm" id="btnExport" title="Download all data as .json">
            <span class="btn__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5-5 5 5"/><path d="M12 15V3"/></svg></span>
            <span>Export</span>
          </button>
          <button class="btn btn--primary btn--sm" id="btnAiSettings" title="Configure the AI backend & models">
            <span class="btn__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></span>
            <span>AI Settings</span>
          </button>
        </div>
        <div class="topbar__accent"></div>
      </header>

      <main class="view" id="view"><!-- modules render here --></main>
    </div>
  </div>

  <!-- hidden file input for import -->
  <input type="file" id="importFile" accept="application/json,.json" style="display:none" />

  <script type="module" src="js/app.js"></script>
</body>
</html>
