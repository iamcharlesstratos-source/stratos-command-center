# Auto-deploy the static site to GitHub Pages on every push to `main`.
# This is the "live updating" engine: edit → commit → push → site rebuilds itself.
# One-time setup: in the repo on GitHub → Settings → Pages → Source = "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you trigger a deploy manually too

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site (repo root — it's a no-build static app)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
